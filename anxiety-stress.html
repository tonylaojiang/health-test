<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">

<title>焦虑压力测评 | 老姜</title>
<!-- 百度统计 -->
<script>
var _hmt = _hmt || [];
(function() {
  var hm = document.createElement("script");
  hm.src = "https://hm.baidu.com/hm.js?替换为你的百度统计ID";

  s.parentNode.insertBefore(hm, s);

</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a3a4a 0%, #1a1a2e 100%);
    color: #333;
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 20px; }
  
  .cover {
    text-align: center;
    padding: 50px 20px;
    background: linear-gradient(135deg, #2d5a6a 0%, #1a3a4a 100%);
    border-radius: 20px;
    color: white;
    margin-bottom: 20px;
  }
  .cover h1 { font-size: 28px; margin-bottom: 15px; }
  .cover .tagline { font-size: 18px; color: #ffd93d; font-weight: bold; margin-bottom: 20px; }
  .cover p { font-size: 14px; opacity: 0.8; line-height: 1.8; }
  .start-btn {
    margin-top: 30px;
    background: #ffd93d;
    color: #1a1a2e;
    border: none;
    padding: 16px 50px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
  }
  .start-btn:hover { transform: scale(1.05); background: #ffcd00; }
  
  .progress-bar {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    height: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd93d, #ffcd00);
    border-radius: 10px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 15px;
  }
  
  .quiz-page { display: none; }
  .quiz-page.active { display: block; }
  
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  
  .question-text {
    font-size: 16px;
    color: #222;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .option-btn {
    padding: 14px 20px;
    border-radius: 10px;
    border: 2px solid #e0e0e0;
    background: white;
    cursor: pointer;
    font-size: 15px;
    text-align: left;
    transition: all 0.2s;
  }
  .option-btn:hover { border-color: #ffd93d; }
  .option-btn.selected { 
    background: #ffd93d; 
    color: #1a1a2e; 
    border-color: #ffd93d;
    font-weight: bold;
  }
  
  .nav-btns {
    display: flex;
    gap: 15px;
    margin-top: 25px;
  }
  .btn-prev {
    padding: 14px 30px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    background: transparent;
    color: white;
    cursor: pointer;
    font-size: 15px;
  }
  .btn-next {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #ffd93d;
    color: #1a1a2e;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
  }
  .btn-next:disabled { background: #999; color: white; cursor: not-allowed; }
  
  .result-page { display: none; text-align: center; }
  .result-page.active { display: block; }
  
  .result-card {
    background: white;
    border-radius: 20px;
    padding: 35px 25px;
    margin-bottom: 20px;
  }
  
  .score-bar {
    background: #f0f0f0;
    border-radius: 10px;
    height: 30px;
    margin: 20px 0;
    overflow: hidden;
    position: relative;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 1s ease;
  }
  .score-bar-fill.low { background: linear-gradient(90deg, #4caf50, #66bb6a); }
  .score-bar-fill.medium { background: linear-gradient(90deg, #ff9800, #ffb74d); }
  .score-bar-fill.high { background: linear-gradient(90deg, #e94560, #ff6b6b); }
  
  .score-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-top: -15px;
    margin-bottom: 15px;
  }
  
  .result-title { font-size: 22px; margin-bottom: 10px; color: #1a1a2e; }
  .result-desc { font-size: 14px; color: #666; line-height: 1.8; }
  
  .anxiety-levels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 25px;
  }
  .level-item {
    padding: 15px 10px;
    border-radius: 10px;
    background: #f7f8fa;
    text-align: center;
  }
  .level-item.active { background: #ffd93d; color: #1a1a2e; }
  .level-item .num { font-size: 24px; font-weight: bold; }
  .level-item .label { font-size: 12px; margin-top: 5px; }
  
  .tip-card {
    background: linear-gradient(135deg, #2d5a6a, #1a3a4a);
    color: white;
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 20px;
    text-align: left;
  }
  .tip-card h3 { font-size: 16px; margin-bottom: 12px; color: #ffd93d; }
  .tip-card p { font-size: 14px; line-height: 1.8; opacity: 0.9; }
  
  .retest-btn {
    background: white;
    color: #2d5a6a;
    border: 2px solid #ffd93d;
    padding: 14px 50px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
  }
  
  .footer {
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 30px;
    padding-bottom: 30px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 封面 -->
  <div class="cover" id="coverPage">
    <h1>🧠 焦虑压力测评</h1>
    <div class="tagline">你的焦虑，在什么级别？</div>
    <p>
      总觉得有什么事要发生？<br>
      控制不住地胡思乱想？<br>
      这不是你"想太多"<br>
      是身体在告诉你该调整了<br><br>
      科学评估你的焦虑水平
    </p>
    <button class="start-btn" onclick="startTest()">开始测评</button>
  </div>

  <!-- 测评页面 -->
  <div class="quiz-page" id="quizPage">
    <div class="progress-text" id="progressText">第 1/20 题</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="questionContainer"></div>
  </div>

  <!-- 结果页面 -->
  <div class="result-page" id="resultPage">
    <div class="result-card">
      <div class="result-title" id="resultTitle">焦虑程度评估</div>
      <div class="score-bar">
        <div class="score-bar-fill" id="scoreBarFill"></div>
      </div>
      <div class="score-labels">
        <span>无/轻微</span>
        <span>中等</span>
        <span>严重</span>
      </div>
      <div id="scoreDisplay" style="font-size: 48px; font-weight: bold; margin: 15px 0;"></div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="anxiety-levels" id="anxietyLevels"></div>
    </div>
    <div class="tip-card" id="tipCard">
      <h3>💡 老姜的建议</h3>
      <p id="tipText"></p>
    </div>
    <button class="retest-btn" onclick="resetTest()">重新测评</button>
  </div>

</div>
<div class="footer">老姜 · 说人话不装 · 聊健康交个朋友</div>

<script>
// ===== 题目数据（基于SAS焦虑自评量表改良）=====
const questions = [
  { text: '你最近是否觉得比平时更紧张、着急？' },
  { text: '你最近是否无缘无故地感到害怕？' },
  { text: '你最近是否容易心里烦乱或觉得惊恐？' },
  { text: '你最近是否觉得自己可能要失控或发疯？' },
  { text: '你最近是否总是往坏处想问题？' },
  { text: '你最近是否经常感到手脚发抖或打颤？' },
  { text: '你最近是否因为头痛、颈痛、背痛等身体不适而苦恼？' },
  { text: '你最近是否感觉容易衰弱和疲乏？' },
  { text: '你最近是否容易心浮气躁，难以安静坐着？' },
  { text: '你最近是否感觉心跳很快或心慌？' },
  { text: '你最近是否经常因为一阵阵头晕而苦恼？' },
  { text: '你最近是否有晕倒或感觉要晕倒的经历？' },
  { text: '你最近呼吸时是否感到费力和困难？' },
  { text: '你最近是否经常手脚麻木或刺痛？' },
  { text: '你最近是否因为胃痛或消化不良而苦恼？' },
  { text: '你最近是否经常要小便（尿频）？' },
  { text: '你最近的手是否经常是干燥和温暖的？' },
  { text: '你最近是否经常脸红发热？' },
  { text: '你最近是否容易入睡且睡得好？' },
  { text: '你最近是否经常做噩梦？' }
];

let currentQuestion = 0;
let answers = new Array(20).fill(null);

function startTest() {
  document.getElementById('coverPage').style.display = 'none';
  document.getElementById('quizPage').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const progress = ((currentQuestion + 1) / 20 * 100).toFixed(0);
  
  document.getElementById('progressText').textContent = `第 ${currentQuestion + 1}/20 题`;
  document.getElementById('progressFill').style.width = progress + '%';
  
  const container = document.getElementById('questionContainer');
  container.innerHTML = `
    <div class="question-card">
      <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
      <div class="options">
        <button class="option-btn ${answers[currentQuestion] === 0 ? 'selected' : ''}" onclick="selectAnswer(0)">
          没有或偶尔（过去一周内不超过1天）
        </button>
        <button class="option-btn ${answers[currentQuestion] === 1 ? 'selected' : ''}" onclick="selectAnswer(1)">
          小部分时间（1-2天有）
        </button>
        <button class="option-btn ${answers[currentQuestion] === 2 ? 'selected' : ''}" onclick="selectAnswer(2)">
          相当多时间（3-4天有）
        </button>
        <button class="option-btn ${answers[currentQuestion] === 3 ? 'selected' : ''}" onclick="selectAnswer(3)">
          绝大部分或全部时间（5-7天有）
        </button>
      </div>
    </div>
    <div class="nav-btns">
      ${currentQuestion > 0 ? '<button class="btn-prev" onclick="prevQuestion()">上一题</button>' : '<div></div>'}
      <button class="btn-next" onclick="nextQuestion()" ${answers[currentQuestion] === null ? 'disabled' : ''}>
        ${currentQuestion < 19 ? '下一题' : '查看结果'}
      </button>
    </div>
  `;
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAnswer(index) {
  answers[currentQuestion] = index;
  renderQuestion();
}

function nextQuestion() {
  if (currentQuestion < 19) {
    currentQuestion++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('resultPage').classList.add('active');
  document.getElementById('progressFill').style.width = '100%';
  
  // 计算总分（粗分：0-4选项，1、2、3、4分；第5、9、13、17、19题为反向计分）
  let totalScore = 0;
  const reverseQuestions = [4, 8, 12, 16, 18]; // 反向计分的题目索引
  
  answers.forEach((ans, i) => {
    if (reverseQuestions.includes(i)) {
      totalScore += (3 - ans); // 反向：0→3, 1→2, 2→1, 3→0
    } else {
      totalScore += (ans + 1); // 正向：0→1, 1→2, 2→3, 3→4
    }
  });
  
  // 显示结果
  const scoreDisplay = document.getElementById('scoreDisplay');
  const scoreBarFill = document.getElementById('scoreBarFill');
  
  let title, desc, tip, level, levelClass;
  
  // 轻度：20-30，中度：31-45，重度：46-60（参考SAS标准）
  if (totalScore <= 30) {
    level = '正常范围';
    levelClass = 'low';
    title = '✅ 焦虑程度：正常';
    desc = '你的焦虑水平在正常范围内。偶尔的焦虑是正常的，这是人类的自我保护机制。';
    tip = '保持现有的生活方式，适度运动、规律作息是维持心理健康的好方法。如果焦虑感突然增加，记得及时调整。';
  } else if (totalScore <= 45) {
    level = '轻度焦虑';
    levelClass = 'medium';
    title = '⚠️ 焦虑程度：轻度';
    desc = '你已经处于轻度焦虑状态。最近的压力或生活中的变化可能对你产生了影响。';
    tip = '建议：1）尝试深呼吸或冥想放松；2）每天留出30分钟完全放空的时间；3）和信任的人聊聊；4）减少咖啡和酒精摄入。如果持续2周以上没有改善，建议咨询心理医生。';
  } else if (totalScore <= 60) {
    level = '中度焦虑';
    levelClass = 'medium';
    title = '⚠️ 焦虑程度：中度';
    desc = '你的焦虑水平已经比较明显了。这种程度的焦虑可能已经影响到你的日常生活和工作。';
    tip = '建议：1）尽快找时间放松和休息；2）和家人或朋友坦诚沟通；3）考虑寻求专业心理咨询；4）如果出现身体症状（如心悸、呼吸困难），建议先去医院排除身体问题。';
  } else {
    level = '重度焦虑';
    levelClass = 'high';
    title = '🔴 焦虑程度：重度';
    desc = '你的焦虑水平已经很高了。这不是"想太多"，而是身体和心理都在报警，需要认真对待。';
    tip = '强烈建议：1）尽快去医院的心理科或精神卫生中心；2）告诉信任的家人朋友你的状态；3）避免在这个时候做重大决定；4)这不是你的错，焦虑是可以治疗的。';
  }
  
  scoreDisplay.textContent = totalScore + ' 分';
  scoreDisplay.style.color = levelClass === 'low' ? '#4caf50' : levelClass === 'medium' ? '#ff9800' : '#e94560';
  
  const percentage = Math.min((totalScore / 80) * 100, 100);
  scoreBarFill.style.width = percentage + '%';
  scoreBarFill.className = 'score-bar-fill ' + levelClass;
  
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultDesc').textContent = desc;
  document.getElementById('tipText').textContent = tip;
  
  // 显示焦虑等级
  const levels = document.getElementById('anxietyLevels');
  levels.innerHTML = `
    <div class="level-item ${totalScore <= 30 ? 'active' : ''}">
      <div class="num">0-30</div>
      <div class="label">正常</div>
    </div>
    <div class="level-item ${totalScore > 30 && totalScore <= 45 ? 'active' : ''}">
      <div class="num">31-45</div>
      <div class="label">轻度</div>
    </div>
    <div class="level-item ${totalScore > 45 ? 'active' : ''}">
      <div class="num">46-60</div>
      <div class="label">中重度</div>
    </div>
  `;
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetTest() {
  currentQuestion = 0;
  answers = new Array(20).fill(null);
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('coverPage').style.display = 'block';
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion();
}
</script>
</body>
</html>
