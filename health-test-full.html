<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全面健康自测 | 老姜</title>
<!-- 百度统计 -->
<script>
var _hmt = _hmt || [];
(function() {
  var hm = document.createElement("script");
  hm.src = "https://hm.baidu.com/hm.js?43bbc21ca2dec962dd61345eb1379927";
  var s = document.getElementsByTagName("script")[0]; 
  s.parentNode.insertBefore(hm, s);
})();
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f7f8fa;
    color: #333;
    min-height: 100vh;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 20px; }
  
  /* 封面 */
  .cover {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 20px;
    color: white;
    margin-bottom: 20px;
  }
  .cover h1 { font-size: 24px; margin-bottom: 10px; }
  .cover p { font-size: 14px; opacity: 0.8; line-height: 1.6; }
  .cover .tagline { font-size: 16px; margin: 15px 0; color: #e94560; font-weight: bold; }
  .start-btn {
    margin-top: 25px;
    background: #e94560;
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .start-btn:hover { transform: scale(1.05); }
  
  /* 进度 */
  .progress-bar {
    background: #e0e0e0;
    border-radius: 10px;
    height: 8px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #ff6b6b);
    border-radius: 10px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-bottom: 15px;
  }
  
  /* 题目卡片 */
  .quiz-page { display: none; }
  .quiz-page.active { display: block; }
  
  .section-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 15px;
  }
  
  .section-title {
    font-size: 16px;
    font-weight: bold;
    color: #1a1a2e;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid #e94560;
  }
  
  .question-item {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid #f0f0f0;
  }
  .question-item:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  
  .question-text {
    font-size: 14px;
    margin-bottom: 10px;
    color: #222;
    line-height: 1.5;
  }
  
  .answer-btns {
    display: flex;
    gap: 10px;
  }
  .btn-yes, .btn-no {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #e0e0e0;
    background: white;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .btn-yes:hover { border-color: #4caf50; color: #4caf50; }
  .btn-no:hover { border-color: #e94560; color: #e94560; }
  .btn-yes.selected { background: #4caf50; color: white; border-color: #4caf50; }
  .btn-no.selected { background: #e94560; color: white; border-color: #e94560; }
  
  .nav-btns { display: flex; gap: 12px; margin-top: 20px; }
  .btn-prev {
    padding: 12px 20px;
    border-radius: 12px;
    border: 2px solid #ddd;
    background: white;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-next {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #1a1a2e;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-next:disabled { background: #ccc; cursor: not-allowed; }
  
  /* 结果页 */
  .result-page { display: none; text-align: center; }
  .result-page.active { display: block; }
  .result-title { font-size: 20px; margin-bottom: 5px; }
  .result-sub { font-size: 13px; color: #888; margin-bottom: 20px; }
  
  .radar-container {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .radar-container canvas { max-width: 100%; }
  
  .score-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
  }
  .score-card {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    text-align: left;
  }
  .score-card .name { font-size: 11px; color: #888; margin-bottom: 3px; }
  .score-card .value { font-size: 18px; font-weight: bold; }
  .score-card .value.green { color: #4caf50; }
  .score-card .value.yellow { color: #ff9800; }
  .score-card .value.red { color: #e94560; }
  
  .result-tip {
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    color: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: left;
  }
  .result-tip h3 { font-size: 15px; margin-bottom: 8px; }
  .result-tip p { font-size: 13px; line-height: 1.7; opacity: 0.9; }
  
  .share-tip {
    background: #fff3e0;
    border-radius: 12px;
    padding: 14px;
    font-size: 13px;
    color: #e65100;
    margin-bottom: 15px;
    text-align: left;
  }
  .share-tip strong { display: block; margin-bottom: 4px; }
  
  .retest-btn {
    background: #e94560;
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 30px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
  }
  
  .footer { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; padding-bottom: 30px; }
</style>
</head>
<body>
<div class="container">

  <!-- 封面 -->
  <div class="cover" id="coverPage">
    <h1>🧬 全面健康自测</h1>
    <div class="tagline">了解你的真实健康状态</div>
    <p>10个维度 · 100道题<br>生理 · 心理 · 饮食 · 运动 · 社交<br>工作 · 性生活 · 生活方式 · 遗传 · 环境</p>
    <button class="start-btn" ontouchend="startTest()" onclick="startTest()">开始测评 →</button>
  </div>

  <!-- 答题区 -->
  <div class="quiz-page" id="quizPage">
    <div class="progress-text" id="progressText">第 1-10 题</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div id="questionContainer"></div>
  </div>

  <!-- 结果页 -->
  <div class="result-page" id="resultPage">
    <div class="result-title">你的健康雷达图 📊</div>
    <div class="result-sub" id="totalScore">总分：0/100</div>
    <div class="radar-container">
      <canvas id="radarCanvas" width="400" height="400"></canvas>
    </div>
    <div class="score-cards" id="scoreCards"></div>
    <div class="result-tip" id="resultTip">
      <h3>💡 老姜说</h3>
      <p id="tipText"></p>
    </div>
    <div class="share-tip">
      <strong>📸 截图分享</strong>
      长按保存上方雷达图，发小红书/朋友圈都可以
    </div>
    <button class="retest-btn" ontouchend="resetTest" onclick="resetTest()">重新测评 ↺</button>
  </div>

</div>
<div class="footer">老姜 · 全面健康自测 · 聊健康说人话不装</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ========== 题目数据 ==========
const categories = [
  { name: '一、生理健康自测', questions: [
    '您的血压正常吗？','您的血糖正常吗？','您的肝肾功能正常吗？',
    '您的血脂正常吗？','您的体重标准吗？','您的大小便正常吗？',
    '您的性功能正常吗？','您弯腰双手能摸到脚趾吗？','您每天都进行深呼吸吗？',
    '您的睡眠好吗？'
  ]},
  { name: '二、心理健康自测', questions: [
    '您能控制自己的情绪吗？','您对工作生活充满信心吗？',
    '您有信心把握好自己的生活吗？','您能开怀大笑吗？',
    '您能在适当的时候让自己哭吗？','您对无法实现的计划能做到不心烦意乱吗？',
    '从不觉得前途渺茫','从不觉得孤独','从不为忧虑而失眠','能很好的放松自己'
  ]},
  { name: '三、饮食健康自测', questions: [
    '您能做到粗细搭配吗？','您能做到饮食结构平衡吗？',
    '您能做到每月饮酒少于5次吗？','您能做到每天吃肉不超过100克吗？',
    '您能做到每天进食规律不吃夜宵吗？','您能做到每天吃2次水果蔬菜吗？',
    '您能做到不挑食吗？','您能做到吃饭时细嚼慢咽吗？',
    '您能做到每天都不吃油炸食品吗？','您能做到每天食盐量少于5克吗？'
  ]},
  { name: '四、运动健康自测', questions: [
    '您能做到每天至少运动20分钟并伴有轻喘吗？',
    '您能做到经常进行各类运动吗？','每周至少100分钟以上低强度锻炼？',
    '每周3次伸展运动，每次10-20分钟能做到吗？',
    '每周至少6次每次10-20分钟健身能做到吗？',
    '每周200分钟以上中高强度的锻炼？',
    '您喜欢尝试新的健身方法吗？','爱好运动有时锻炼的筋疲力尽，您是这样吗？',
    '您能很好的控制自身的运动量吗？','您能很好的控制自身的运动量吗？'
  ]},
  { name: '五、社会交往能力健康自测', questions: [
    '有问题问他人而不愿翻资料吗？',
    '在交往中坚守诚信您能做到吗？','意见不同时能用委婉方式表达给对方吗？',
    '敢于承认自己的错误，必要时能主动道歉吗？','您能很好的倾听别人的讲话吗？',
    '您至少有3个亲密的朋友吗？','交谈中不打断别人的讲话，您能做到吗？',
    '您能很快结交新朋友吗？','愿意和朋友相处而不愿意独处吗？',
    '在交往中得到很大的快乐吗？'
  ]},
  { name: '六、工作能力健康自测', questions: [
    '感到工作没有压力吗？','喜欢自己选择的工作吗？',
    '感到工作是一种乐趣吗？','遵守工作制度吗？',
    '工作对自己应该有所回报吗？','工作中有自豪及成就感吗？',
    '工作中有追求及艺术感吗？','尊重和喜欢自己的同事吗？',
    '工作中能得到激励吗？','能充分发挥自己的工作能力吗？'
  ]},
  { name: '七、性生活能力健康自测', questions: [
    '性生活能使自己感到快乐吗？','认为自慰是可以接受的吗？',
    '每周维持正常的性生活频率吗？','作爱时能经常出现高潮吗？',
    '经常拥抱和亲吻吗？','您对自己的性生活感到满意吗？',
    '能体会快感并不完全追求性高潮吗？','渴望长得美丽并让人仰慕吗？',
    '不会因爱而失去理智吗？','不过分追求性爱吗？'
  ]},
  { name: '八、生活方式健康自测', questions: [
    '生活充满自信吗？','经常外出郊游吗？',
    '不吸烟吗？','不饮酒或日饮酒不超过2两吗？',
    '生活中爱开玩笑吗？','每天生活工作有规律吗？',
    '经常主动干些家务吗？','能合理理财吗？',
    '在生活中有防范意识或行为吗？','在生活中能注意个人及家庭卫生吗？'
  ]},
  { name: '九、遗传与健康自测', questions: [
    '您了解一些遗传病的知识吗？','您了解高血压吗？',
    '家中没有60岁以前患心脑血管疾病的人吗？','家中没有糖尿病人吗？',
    '家中没有高血压病人吗？','您的父母或祖父母活到高龄吗？',
    '家中上一代没有得遗传病的人吗？','您知道那些人不能结婚生育吗？',
    '您知道婚检可防止遗传病吗？','您知道产前检查可防止遗传病吗？'
  ]},
  { name: '十、生活环境健康自测', questions: [
    '工作生活环境无噪音吗？','居室能做到每天通风30分钟吗？',
    '住房周围有河（海）水吗？','经常晒太阳吗？',
    '家中装修环保无污染吗？','邻里关系和睦吗？',
    '您很关注周围环境的变化吗？','不乱丢垃圾吗？',
    '自觉增强环保意识吗？','懂得保护环境是对下一代负责吗？'
  ]}
];

let currentSection = 0;
let answers = new Array(100).fill(null);
let chart = null;

function startTest() {
  document.getElementById('coverPage').style.display = 'none';
  document.getElementById('quizPage').classList.add('active');
  renderSection();
}

function renderSection() {
  const cat = categories[currentSection];
  const container = document.getElementById('questionContainer');
  
  const pct = ((currentSection * 10) / 100 * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = '第 ' + (currentSection * 10 + 1) + '-' + (currentSection * 10 + 10) + ' 题 · ' + cat.name;

  let html = `<div class="section-card">
    <div class="section-title">${cat.name}</div>`;
  
  for (let i = 0; i < 10; i++) {
    const qIdx = currentSection * 10 + i;
    const saved = answers[qIdx];
    html += `
      <div class="question-item">
        <div class="question-text">${qIdx + 1}. ${cat.questions[i]}</div>
        <div class="answer-btns">
          <button class="btn-yes ${saved === 1 ? 'selected' : ''}" ontouchend="selectAnswer" onclick="selectAnswer(${qIdx}, 1)">✅ 是</button>
          <button class="btn-no ${saved === 0 ? 'selected' : ''}" ontouchend="selectAnswer" onclick="selectAnswer(${qIdx}, 0)">❌ 否</button>
        </div>
      </div>
    `;
  }
  
  html += `</div>
    <div class="nav-btns">
      ${currentSection > 0 ? '<button class="btn-prev" ontouchend="prevSection" onclick="prevSection()">← 上一组</button>' : '<div></div>'}
      <button class="btn-next" ontouchend="nextSection" onclick="nextSection()">
        ${currentSection < 9 ? '下一组 →' : '查看结果 →'}
      </button>
    </div>`;
  
  container.innerHTML = html;
}

function selectAnswer(qIdx, val) {
  answers[qIdx] = val;
  const btns = document.querySelectorAll(`.btn-yes, .btn-no`);
  btns.forEach(b => b.classList.remove('selected'));
  document.querySelectorAll(`button[ontouchend="selectAnswer" onclick="selectAnswer(${qIdx}, ${val})"]`).forEach(b => b.classList.add('selected'));
}

function nextSection() {
  if (currentSection < 9) {
    currentSection++;
    renderSection();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function prevSection() {
  if (currentSection > 0) {
    currentSection--;
    renderSection();
  }
}

function showResult() {
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('resultPage').classList.add('active');
  document.getElementById('progressFill').style.width = '100%';

  // 计算各维度得分
  const scores = categories.map((cat, i) => {
    const start = i * 10;
    const slice = answers.slice(start, start + 10);
    return slice.reduce((a, b) => a + (b || 0), 0);
  });
  const total = scores.reduce((a, b) => a + b, 0);

  document.getElementById('totalScore').textContent = '总分：' + total + '/100';

  // 绘制雷达图
  const ctx = document.getElementById('radarCanvas').getContext('2d');
  if (chart) chart.destroy();

  const labels = categories.map(c => c.name.replace('自测', ''));
  const bgColors = scores.map(s => {
    if (s > 8) return 'rgba(76, 175, 80, 0.8)';
    if (s >= 6) return 'rgba(255, 152, 0, 0.8)';
    return 'rgba(233, 69, 96, 0.8)';
  });

  chart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [{
        label: '健康得分',
        data: scores,
        backgroundColor: 'rgba(233, 69, 96, 0.15)',
        borderColor: 'rgba(233, 69, 96, 0.9)',
        borderWidth: 2,
        pointBackgroundColor: bgColors,
        pointRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          min: 0, max: 10,
          ticks: { stepSize: 2, font: { size: 10 } },
          pointLabels: {
            font: { size: 11, weight: 'bold' },
            color: '#333'
          },
          grid: { color: 'rgba(0,0,0,0.08)' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => '得分：' + ctx.raw + '/10'
          }
        }
      }
    }
  });

  // 分数卡片
  const shortNames = ['生理', '心理', '饮食', '运动', '社交', '工作', '性生活', '生活方式', '遗传', '环境'];
  const cardsEl = document.getElementById('scoreCards');
  cardsEl.innerHTML = categories.map((cat, i) => {
    const s = scores[i];
    let color = 'red';
    if (s > 8) color = 'green';
    else if (s >= 6) color = 'yellow';
    return '<div class="score-card"><div class="name">'+shortNames[i]+'</div><div class="value '+color+'">'+s+'/10</div></div>';
  }).join('');

  // 评语
  let tip = '';
  if (total >= 80) tip = '🎉 整体状态非常棒！你的健康观很全面，继续保持。注意短板维度的提升会更好。';
  else if (total >= 60) tip = '✅ 健康基本达标，但还有提升空间。重点关注得分低于6的维度，它们可能是未来的隐患。';
  else if (total >= 40) tip = '⚠️ 多个维度亮红灯了。健康不只是"没病"，而是10个方面的平衡。先从最感兴趣的1-2个开始调整。';
  else tip = '🚨 身体已经在报警了。十个维度全面滑坡，说明你的生活方式需要系统性改变。老姜建议你认真对待。';
  document.getElementById('tipText').textContent = tip;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetTest() {
  currentSection = 0;
  answers = new Array(100).fill(null);
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('coverPage').style.display = 'block';
  renderSection();
}
</script>
</body>
</html>
